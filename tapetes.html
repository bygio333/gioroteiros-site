<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TAPETES — indica by gio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=League+Spartan:wght@400;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'League Spartan', sans-serif;
    background: #16a085;
    min-height: 100vh;
  }

  /* NAV */
  nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 40px;
    background: #16a085;
  }
  .nav-back {
    font-family: 'League Spartan', sans-serif;
    font-weight: 700;
    font-size: 0.9rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.85);
    text-decoration: none;
    transition: color 0.2s;
  }
  .nav-back:hover { color: #fff; }
  .nav-logo {
    font-family: 'League Spartan', sans-serif;
    font-weight: 700;
    font-size: 1.1rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.9);
    text-decoration: none;
  }

  /* HEADER */
  .page-header {
    padding: 10px 40px 32px;
  }
  .page-title {
    font-family: 'League Spartan', sans-serif;
    font-weight: 700;
    font-size: clamp(2.8rem, 8vw, 6rem);
    color: #fff;
    letter-spacing: -0.01em;
    line-height: 1;
    text-transform: uppercase;
  }

  /* GRID */
  .grid-section {
    padding: 0 30px 60px;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
  }

  /* CARD */
  .card {
    background: #fff;
    border-radius: 10px;
    overflow: hidden;
    cursor: pointer;
    text-decoration: none;
    color: #1a1a1a;
    display: flex;
    flex-direction: column;
    transition: transform 0.22s ease, box-shadow 0.22s ease;
  }
  .card:hover {
    transform: translateY(-5px);
    box-shadow: 0 14px 32px rgba(0,0,0,0.18);
  }
  .card-img {
    width: 100%;
    aspect-ratio: 1 / 1;
    background: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }
  .card-img img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    padding: 16px;
    transition: transform 0.4s ease;
  }
  .card:hover .card-img img { transform: scale(1.05); }
  .placeholder {
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #f8f8f8, #efefef);
    font-size: 3.5rem;
  }
  .card-label {
    font-family: 'League Spartan', sans-serif;
    font-weight: 700;
    font-size: 0.82rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 12px 14px 14px;
    line-height: 1.2;
    color: #1a1a1a;
    background: #fff;
    border-top: 1px solid #f0f0f0;
  }

  /* FOOTER */
  footer {
    background: rgba(0,0,0,0.15);
    text-align: center;
    padding: 28px 40px;
    margin-top: 20px;
  }
  footer a {
    font-family: 'League Spartan', sans-serif;
    font-size: 0.75rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.55);
    text-decoration: none;
  }

  @media (max-width: 900px) {
    .grid { grid-template-columns: repeat(2, 1fr); }
    nav, .page-header, .grid-section { padding-left: 20px; padding-right: 20px; }
  }
  @media (max-width: 500px) {
    .grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
    .grid-section { padding-bottom: 40px; }
  }
</style>
</head>
<body>

<nav>
  <a class="nav-back" href="index.html">← voltar</a>
  <a class="nav-logo" href="index.html">indica by gio</a>
</nav>

<div class="page-header">
  <h1 class="page-title">TAPETES</h1>
</div>

<section class="grid-section">
  <div class="grid">
    <a class="card" href="https://www.amazon.com.br/Tapete-Passadeira-Persa-Boho-5x129cm/dp/B0GM9K7T26?linkCode=ll2&tag=giocassimiro-20" target="_blank" rel="noopener">
<div class="card-img"><img src="https://ws-na.amazon-adsystem.com/widgets/q?_encoding=UTF8&MarketPlace=BR&ASIN=B0GM9K7T26&ServiceVersion=20070822&ID=AsinImage&WS=1&Format=_SL300_&tag=giocassimiro-20" alt="Passadeira Persa" loading="lazy"></div>
      <div class="card-label">Passadeira Persa</div>
    </a>
  </div>
</section>

<footer>
  <a href="index.html">indica by gio</a>
</footer>

<script>
// Load MercadoLivre product images via public API
document.querySelectorAll('[data-ml-id]').forEach(async (img) => {
  const mlId = img.getAttribute('data-ml-id');
  if (!mlId) return;
  try {
    const res = await fetch(`https://api.mercadolibre.com/items/${mlId}`);
    const data = await res.json();
    if (data && data.pictures && data.pictures.length > 0) {
      img.src = data.pictures[0].secure_url;
      img.style.display = 'block';
      const ph = img.parentElement.querySelector('.placeholder');
      if (ph) ph.style.display = 'none';
    }
  } catch(e) {
    // keep placeholder
  }
});
</script>
</body>
</html>
